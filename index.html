<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Lens | Explainable Governance for Buildings</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --emerald-glow: rgba(16, 185, 129, 0.2);
            --blue-glow: rgba(59, 130, 246, 0.2);
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9; 
            overflow-x: hidden; 
        }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        
        .grid-bg {
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
        }

        .text-gradient {
            background: linear-gradient(135deg, #4ade80 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glow-button {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-button:hover {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
            transform: translateY(-2px);
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 0.9; }
        }
        .pulse-ring { animation: pulse-ring 3s ease-in-out infinite; }

        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="grid-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className = "", size = 24 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [wastageValue, setWastageValue] = useState(14.2);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                
                const interval = setInterval(() => {
                    setWastageValue(prev => {
                        const next = parseFloat(prev) + (Math.random() * 0.4 - 0.2);
                        return Math.max(8.5, parseFloat(next.toFixed(1)));
                    });
                }, 3000);

                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    clearInterval(interval);
                };
            }, []);

            const navLinks = [
                { name: 'Problem', href: '#problem' },
                { name: 'Explainability', href: '#explain' },
                { name: 'Impact Engine', href: '#impact' },
                { name: 'Team', href: '#about' },
                { name: 'Roadmap', href: '#roadmap' }
            ];

            return (
                <div className="min-h-screen">
                    {/* Atmospheric Lighting */}
                    <div className="fixed inset-0 z-0 overflow-hidden pointer-events-none">
                        <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-emerald-500/20 blur-[160px] rounded-full opacity-60" />
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-blue-600/15 blur-[160px] rounded-full opacity-60" />
                    </div>

                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 px-6 ${isScrolled ? 'py-4' : 'py-8'}`}>
                        <div className={`max-w-7xl mx-auto flex justify-between items-center px-8 py-4 rounded-3xl border border-white/10 transition-all ${isScrolled || mobileMenuOpen ? 'glass-card bg-slate-900/90 shadow-2xl' : 'bg-transparent'}`}>
                            <div className="flex items-center gap-4 group cursor-pointer">
                                <div className="p-2.5 bg-emerald-500 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.4)] group-hover:rotate-12 transition-transform">
                                    <Icon name="layers" className="text-slate-950" size={22} />
                                </div>
                                <span className="text-2xl font-bold tracking-tighter text-white uppercase italic">INFRA<span className="text-emerald-400 not-italic font-light">LYTIX</span></span>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-10">
                                {navLinks.map(link => (
                                    <a key={link.name} href={link.href} className="text-[11px] font-black uppercase tracking-[0.25em] text-slate-300 hover:text-emerald-400 transition-colors">
                                        {link.name}
                                    </a>
                                ))}
                                <button className="glow-button bg-white text-slate-950 px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg">
                                    Request Pilot
                                </button>
                            </div>

                            <button className="md:hidden text-white" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                <Icon name={mobileMenuOpen ? "x" : "menu"} size={24} />
                            </button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative pt-64 pb-32 px-6 z-10">
                        <div className="max-w-6xl mx-auto text-center">
                            <div className="inline-flex items-center gap-3 px-6 py-3 rounded-full bg-slate-900 border border-emerald-500/30 text-emerald-400 text-[11px] font-bold uppercase tracking-[0.4em] mb-12 shadow-2xl">
                                <Icon name="shield-check" size={16} />
                                Read-Only Operational Insight Layer
                            </div>
                            
                            <h1 className="text-6xl md:text-[7.5rem] font-bold text-white leading-[0.9] tracking-tighter mb-10">
                                See the energy you <br/>
                                <span className="text-gradient italic">didn't know</span> was wasted.
                            </h1>
                            
                            <p className="text-xl md:text-2xl text-slate-300 max-w-3xl mx-auto leading-relaxed mb-20 font-light italic">
                                "Because not every running system should be running."
                            </p>
                            
                            <div className="flex flex-wrap justify-center gap-12 md:gap-24 items-center">
                                <div className="text-center group">
                                    <div className="text-6xl font-black text-white mb-2 tracking-tighter group-hover:text-emerald-400 transition-colors italic">10-30%</div>
                                    <div className="text-[11px] uppercase tracking-[0.3em] text-slate-400 font-black">Avg. Cost Recovery Potential</div>
                                </div>
                                <div className="h-20 w-px bg-white/20 hidden md:block" />
                                <div className="text-center group">
                                    <div className="text-6xl font-black text-white mb-2 tracking-tighter group-hover:text-emerald-400 transition-colors italic">Zero</div>
                                    <div className="text-[11px] uppercase tracking-[0.3em] text-slate-400 font-black">Control Risk (Read-Only)</div>
                                </div>
                            </div>
                        </div>
                    </section>

                            <div>
                                <h2 className="text-5xl md:text-7xl font-bold text-white mb-10 leading-[0.95] tracking-tight italic">
                                    BMS executes rules, <br/> <span className="text-emerald-400 not-italic font-light">but doesn't judge.</span>
                                </h2>
                                <p className="text-xl text-slate-200 mb-12 font-light leading-relaxed">
                                    Operators are flooded with component alarms, not system-wide insights. Energy Lens sits above your BMS to answer the one missing question: <span className="text-white font-bold italic">"Is this energy usage justified?"</span>
                                </p>
                                <div className="grid gap-10">
                                    {[
                                        { t: "After-Hours Run", d: "Systems running at full load when terminals stand empty." },
                                        { t: "Overcooling Waste", d: "Excessive cooling driving costs without improving comfort." },
                                        { t: "Override Persistence", d: "Manual overrides that are never returned to auto-logic." }
                                    ].map((item, i) => (
                                        <div key={i} className="flex gap-6 group">
                                            <div className="p-3 h-fit bg-emerald-500/20 rounded-xl group-hover:bg-emerald-500/30 transition-colors border border-emerald-500/20">
                                                <Icon name="alert-triangle" size={20} className="text-emerald-400" />
                                            </div>
                                            <div>
                                                <h4 className="text-white font-bold text-xl mb-1">{item.t}</h4>
                                                <p className="text-slate-400 text-base leading-relaxed">{item.d}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="glass-card p-12 rounded-[4rem] relative overflow-hidden border-white/20 shadow-emerald-500/10 shadow-2xl bg-slate-900/80">
                                <div className="flex justify-between items-center mb-12">
                                    <div className="flex items-center gap-3">
                                        <div className="w-3 h-3 rounded-full bg-red-500 pulse-ring shadow-[0_0_12px_rgba(239,68,68,0.7)]" />
                                        <span className="text-xs font-black tracking-widest uppercase text-slate-300">System Anomaly Detected</span>
                                    </div>
                                    <div className="px-3 py-1.5 rounded bg-red-500/20 border border-red-500/30 text-red-400 text-[10px] font-black uppercase">Terminal 2 West</div>
                                </div>
                                <div className="space-y-10">
                                    <div className="h-56 flex items-end gap-2.5 border-b border-white/20 pb-4 px-2">
                                        {[25, 35, 30, 85, 95, 90, 88].map((h, i) => (
                                            <div key={i} className={`flex-1 rounded-t-xl transition-all duration-700 ${i > 2 ? 'bg-red-500/60 border-t-2 border-red-400' : 'bg-slate-700 border-t-2 border-slate-500'}`} style={{ height: `${h}%` }} />
                                        ))}
                                    </div>
                                    <div className="flex justify-between text-[11px] font-bold text-slate-400 uppercase tracking-wider">
                                        <span>00:00 AM</span>
                                        <span className="text-red-400 font-black tracking-[0.2em]">Unjustified runtime leakage</span>
                                        <span>06:00 AM</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Explainability Section */}
                    <section id="explain" className="py-40 px-6 z-10 relative">
                        <div className="max-w-4xl mx-auto">
                            <div className="text-center mb-24">
                                <h2 className="text-5xl md:text-7xl font-bold text-white mb-8 italic">Explainable Audit</h2>
                                <p className="text-slate-300 text-xl font-light leading-relaxed">Every insight is traceable to logic that operational teams understand and trust.</p>
                            </div>

                            <div className="space-y-6">
                                <div className="glass-card p-12 rounded-[3.5rem] border-white/15 bg-slate-900/60">
                                    <div className="flex flex-col md:flex-row gap-10 items-start mb-12">
                                        <div className="w-14 h-14 rounded-2xl bg-emerald-500/20 flex items-center justify-center shrink-0 border border-emerald-500/30">
                                            <span className="text-emerald-400 text-xl font-black italic">01</span>
                                        </div>
                                        <div>
                                            <h3 className="text-2xl font-bold text-white mb-3 italic">What happened?</h3>
                                            <p className="text-slate-200 leading-relaxed font-light text-xl italic">
                                                "AHU-04 is running at 100% cooling load, but the terminal departure gates report <span className="text-emerald-400">zero passengers</span> and 22°C ambient temperature."
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col md:flex-row gap-10 items-start mb-12">
                                        <div className="w-14 h-14 rounded-2xl bg-blue-500/20 flex items-center justify-center shrink-0 border border-blue-500/30">
                                            <span className="text-blue-400 text-xl font-black italic">02</span>
                                        </div>
                                        <div>
                                            <h3 className="text-2xl font-bold text-white mb-3 italic">Why it matters?</h3>
                                            <p className="text-slate-200 leading-relaxed font-light text-lg">
                                                This creates a <span className="text-white font-bold border-b border-white/30">₹4,200/hour</span> leakage and a <span className="text-white font-bold border-b border-white/30">12kg CO₂</span> penalty.
                                            </p>
                                        </div>
                                    </div>

                                    <div className="flex flex-col md:flex-row gap-10 items-start">
                                        <div className="w-14 h-14 rounded-2xl bg-slate-800 flex items-center justify-center shrink-0 border border-white/20">
                                            <span className="text-slate-400 text-xl font-black italic">03</span>
                                        </div>
                                        <div>
                                            <h3 className="text-2xl font-bold text-white mb-3 italic">Actionable Insight</h3>
                                            <p className="text-slate-300 leading-relaxed font-light text-lg">
                                                Manual setpoint override (18°C) detected on zone controller B-12. <span className="text-white">Recommend returning to auto-logic.</span>
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-center pt-8">
                                    <span className="text-xs font-black uppercase tracking-[0.5em] text-slate-500">Audit-ready evidence for facilities & finance</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Impact Engine */}
                    <section id="impact" className="py-40 px-6 z-10 relative bg-slate-900/60 border-y border-white/10">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center max-w-3xl mx-auto mb-32">
                                <h2 className="text-5xl md:text-7xl font-bold text-white mb-8 italic">The Impact Engine</h2>
                                <p className="text-slate-300 text-2xl font-light italic">Quantifying wastage into accountability.</p>
                            </div>

                            <div className="grid lg:grid-cols-3 gap-10">
                                <div className="glass-card p-12 rounded-[4rem] border-white/15 hover:border-emerald-500/30 transition-all group bg-slate-900/40">
                                    <div className="mb-10 p-5 bg-emerald-500/20 rounded-2xl inline-block group-hover:scale-110 transition-transform border border-emerald-500/20">
                                        <Icon name="wind" className="text-emerald-400" size={36} />
                                    </div>
                                    <h3 className="text-3xl font-bold text-white mb-6 italic">HVAC Focus</h3>
                                    <p className="text-slate-300 text-lg leading-relaxed mb-10 font-light">Targeting the largest energy consumer (60-70% of building load) for immediate ROI.</p>
                                    <div className="flex flex-wrap gap-3">
                                        {['Terminal Units', 'Chillers', 'FCUs'].map(li => (
                                            <span key={li} className="px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest text-slate-300 group-hover:bg-emerald-500/10 transition-colors">{li}</span>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass-card p-12 rounded-[4rem] border-white/15 hover:border-blue-500/30 transition-all group bg-slate-900/40">
                                    <div className="mb-10 p-5 bg-blue-500/20 rounded-2xl inline-block group-hover:scale-110 transition-transform border border-blue-500/20">
                                        <Icon name="file-text" className="text-blue-400" size={36} />
                                    </div>
                                    <h3 className="text-3xl font-bold text-white mb-6 italic">Audit Evidence</h3>
                                    <p className="text-slate-300 text-lg leading-relaxed mb-10 font-light">Every anomaly creates a "Wastage Package" used to justify maintenance and budget recovery.</p>
                                    <div className="flex flex-wrap gap-3">
                                        {['Cost Impact', 'CO2 Delta', 'Proof of Loss'].map(li => (
                                            <span key={li} className="px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest text-slate-300 group-hover:bg-blue-500/10 transition-colors">{li}</span>
                                        ))}
                                    </div>
                                </div>

                                <div className="p-12 rounded-[4rem] bg-emerald-500/10 border border-emerald-500/40 relative overflow-hidden group shadow-2xl shadow-emerald-500/20">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/20 blur-[80px] rounded-full" />
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-center mb-12">
                                            <span className="text-xs font-black uppercase text-emerald-400 tracking-[0.4em]">Live Baseline Deviation</span>
                                            <div className="flex gap-2">
                                                <div className="w-1.5 h-6 bg-emerald-500 animate-[bounce_1s_infinite]" />
                                                <div className="w-1.5 h-6 bg-emerald-500 animate-[bounce_1.4s_infinite]" />
                                                <div className="w-1.5 h-6 bg-emerald-500 animate-[bounce_0.8s_infinite]" />
                                            </div>
                                        </div>
                                        <div className="text-8xl font-bold text-white mb-2 tracking-tighter italic">{wastageValue}%</div>
                                        <div className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-12">System Leakage Rate</div>
                                        
                                        <div className="space-y-6 pt-10 border-t border-white/20">
                                            <div className="flex justify-between text-sm">
                                                <span className="text-slate-400 font-bold uppercase tracking-widest">Budget Drift (EST)</span>
                                                <span className="text-emerald-400 font-black text-lg">₹{(wastageValue * 1.5).toFixed(1)}L / MO</span>
                                            </div>
                                            <div className="flex justify-between text-sm">
                                                <span className="text-slate-400 font-bold uppercase tracking-widest">Logic Trust</span>
                                                <span className="text-white font-black italic text-lg uppercase">Audit Ready</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* About Us Section */}
                    <section id="about" className="py-40 px-6 z-10 relative">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center max-w-3xl mx-auto mb-32">
                                <h2 className="text-5xl md:text-7xl font-bold text-white mb-8 italic uppercase tracking-tighter">The Team</h2>
                                <p className="text-slate-300 text-2xl font-light italic">Building the future of explainable building governance.</p>
								<p className="text-slate-300 text-2xl font-light italic">Our approach is grounded in operational reality. We prioritize clarity over complexity, measurable outcomes over theoretical optimization, and solutions that teams can trust and act on with confidence.</p>
                            </div>

                            <div className="grid md:grid-cols-2 gap-12 max-w-5xl mx-auto">

									</div>
                                    <h3 className="text-4xl font-bold text-white mb-2 italic">Ravi Raj</h3>
                                    <p className="text-emerald-400 text-xs font-black uppercase tracking-[0.4em] mb-6">Founder & Product Lead</p>

                                    { p: "PHASE 01", t: "HVAC Intelligence", d: "Deep audit of terminal units and chiller drift. Detecting after-hours waste and schedule drift.", i: "wind", active: true },
